<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creador de Planeaciones NEM - Fase 2</title>
    <style>
        :root {
            --primary: #d81b60;
            --secondary: #1e88e5;
            --ai-color: #8e24aa;
            --background: #fdf6f0;
            --card-bg: #ffffff;
            --text: #37474f;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 2px dashed #f48fb1;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: bold;
            margin-bottom: 5px;
            color: #455a64;
        }

        input, select, textarea {
            padding: 10px;
            border: 2px solid #cfd8dc;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
        }

        .pass-box {
            background-color: #f3e5f5;
            border: 1px dashed var(--ai-color);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .pda-container {
            background-color: #f9f9f9;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #cfd8dc;
            max-height: 200px;
            overflow-y: auto;
        }

        .pda-item {
            margin-bottom: 8px;
            font-size: 0.95rem;
            display: flex;
            align-items: flex-start;
        }

        .pda-item input { margin-right: 8px; margin-top: 4px; }

        button {
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1.1rem;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-weight: bold;
            transition: opacity 0.3s;
        }

        .btn-primary { background-color: var(--primary); }
        .btn-ai { background-color: var(--ai-color); }
        button:hover { opacity: 0.9; }

        #loading {
            display: none;
            text-align: center;
            color: var(--ai-color);
            font-weight: bold;
            margin: 10px 0;
        }

        #output {
            margin-top: 30px;
            padding: 25px;
            border: 2px solid #37474f;
            background: #fff;
            border-radius: 10px;
            display: none;
        }

        .header-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        .header-table td { border: 1px solid #37474f; padding: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 Diseñador Metodológico NEM (Preescolar)</h1>

    <div class="pass-box">
        <label style="color: var(--ai-color);">🔑 Acceso a Funciones de IA:</label>
        <p style="margin: 5px 0; font-size: 0.85rem; color: #6a1b9a;">Ingresa la contraseña del aula para activar el redactor automático.</p>
        <input type="password" id="claveAcceso" placeholder="Contraseña del sistema...">
    </div>
    
    <div class="grid">
        <div class="form-group">
            <label>Nombre del Docente:</label>
            <input type="text" id="docente" placeholder="Tu nombre">
        </div>
        <div class="form-group">
            <label>Nombre del Proyecto / Situación:</label>
            <input type="text" id="proyecto" placeholder="Ej. Detectives de figuras">
        </div>
        <div class="form-group">
            <label>Grado y Grupo:</label>
            <input type="text" id="grado" placeholder="Ej. Multigrado">
        </div>
        <div class="form-group">
            <label>Temporalidad:</label>
            <input type="text" id="tiempo" placeholder="Ej. 10 días">
        </div>
    </div>

    <div class="grid">
        <div class="form-group">
            <label>Campo Formativo Principal:</label>
            <select id="campo" onchange="actualizarContenidos()">
                <option value="">-- Selecciona un Campo --</option>
                <option value="Lenguajes">🗣️ Lenguajes</option>
                <option value="Saberes y Pensamiento Científico">🔬 Saberes y Pensamiento Científico</option>
                <option value="Ética, Naturaleza y Sociedades">🌍 Ética, Naturaleza y Sociedades</option>
                <option value="De lo Humano y lo Comunitario">🤝 De lo Humano y lo Comunitario</option>
            </select>
        </div>
        <div class="form-group">
            <label>Contenido Oficial:</label>
            <select id="contenido" onchange="actualizarPDAs()" disabled>
                <option value="">-- Primero selecciona un Campo --</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <label>Procesos de Desarrollo de Aprendizaje (PDA):</label>
        <div id="pda-list" class="pda-container">
            <span style="color: #757575; font-style: italic;">Selecciona un contenido...</span>
        </div>
    </div>

    <div class="grid">
        <div class="form-group">
            <label>Modalidad de Trabajo:</label>
            <select id="modalidad">
                <option value="Proyecto Didáctico">📂 Proyecto Didáctico (NEM)</option>
                <option value="Secuencia Didáctica Específica">🧩 Secuencia Didáctica Específica</option>
                <option value="Actividades Permanentes">⏰ Actividades Permanentes / Rutinas</option>
            </select>
        </div>
        <div class="form-group">
            <label>Metodología Sociocrítica:</label>
            <select id="metodologia">
                <option value="Aprendizaje Basado en Proyectos Comunitarios">👥 Aprendizaje Basado en Proyectos Comunitarios</option>
                <option value="Aprendizaje Basado en Indagación (STEAM)">🚀 Indagación bajo enfoque STEAM</option>
                <option value="Aprendizaje Basado en Problemas (ABP)">🧩 Aprendizaje Basado en Problemas (ABP)</option>
                <option value="Aprendizaje Servicio (AS)">❤️ Aprendizaje Servicio (AS)</option>
                <option value="Enfoque integrado">⚪ Secuencia Integrada</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <label>Ejes Articuladores (Selecciona los necesarios):</label>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4px; font-size: 0.9rem;">
            <label><input type="checkbox" name="ejes" value="Inclusión"> Inclusión</label>
            <label><input type="checkbox" name="ejes" value="Pensamiento Crítico"> Pensamiento Crítico</label>
            <label><input type="checkbox" name="ejes" value="Interculturalidad Crítica"> Interculturalidad Crítica</label>
            <label><input type="checkbox" name="ejes" value="Igualdad de Género"> Igualdad de Género</label>
            <label><input type="checkbox" name="ejes" value="Vida Saludable"> Vida Saludable</label>
            <label><input type="checkbox" name="ejes" value="Artes y Experiencias Estéticas"> Artes y Experiencias Estéticas</label>
        </div>
    </div>

    <button type="button" class="btn-ai" onclick="generarConIA()">✨ Redactar Actividades y Evaluación con IA</button>
    <div id="loading">🔮 La IA está estructurando tu propuesta lúdica para preescolar...</div>

    <div class="form-group" style="margin-top: 15px;">
        <label>Secuencia Didáctica (Inicio, Desarrollo, Cierre):</label>
        <textarea id="secuencia" style="height: 150px;" placeholder="Las actividades sugeridas se redactarán aquí..."></textarea>
    </div>

    <div class="form-group">
        <label>Estrategias de Evaluación Formativa y Ajustes Razonables (DUA):</label>
        <textarea id="evaluacion" style="height: 100px;" placeholder="Las sugerencias de evaluación formativa aparecerán aquí..."></textarea>
    </div>

    <button type="button" class="btn-primary" onclick="imprimirFormato()">💾 Generar Formato Final</button>

    <div id="output">
        <button style="background-color: var(--secondary); margin-bottom: 15px;" onclick="window.print()">🖨️ Guardar PDF / Imprimir</button>
        <div id="print-area"></div>
    </div>
</div>

<script>
// Base de datos integrada con los contenidos oficiales del programa sintético
const bancoDatos = {
    "Lenguajes": [
        { id: "L1", titulo: "Comunicación de necesidades, emociones, gustos, ideas y saberes, desde una perspectiva comunitaria.", pdas: ["1º - Expresa necesidades mediante gestos y sonidos.", "2º - Manifiesta ideas claras usando diversos lenguajes.", "3º - Expresa con precisión ideas ante sus pares."] },
        { id: "L2", titulo: "Narración de historias mediante diversos lenguajes y apropiación de la cultura escrita.", pdas: ["1º - Describe personajes de historias conocidas.", "2º - Narra historias inventadas con imágenes.", "3º - Cuenta mitos y leyendas con secuencia lógica."] },
        { id: "L3", titulo: "Expresión de emociones y experiencias a través de los lenguajes artísticos.", pdas: ["1º - Representa vivencias de forma corporal o plástica.", "2º - Elige colores y texturas para estados de ánimo.", "3º - Combina lenguajes artísticos para crear mundos."] },
        { id: "L4", titulo: "Producciones gráficas dirigidas a diversos destinatarios, para establecer vínculos sociales.", pdas: ["1º - Produce trazos o dibujos con intención comunicativa.", "2º - Elabora recados o cartas con dictado al docente.", "3º - Planifica y organiza la escritura colectiva de textos."] }
    ],
    "Saberes y Pensamiento Científico": [
        { id: "S1", titulo: "Los saberes numéricos como herramienta para resolver situaciones del entorno.", pdas: ["1º - Dice los números en orden ascendente.", "2º - Cuenta colecciones fijas de elementos cotidianos.", "3º - Propone códigos numéricos para resolver juegos."] },
        { id: "S2", titulo: "El dominio del espacio y reconocimiento de formas en el entorno.", pdas: ["1º - Usa referentes espaciales básicos para ubicarse.", "2º - Identifica formas geométricas en objetos reales.", "3º - Traza mapas y croquis simples del aula/comunidad."] },
        { id: "S3", titulo: "Características de los objetos, materiales del entorno y de los seres vivos.", pdas: ["1º - Clasifica materiales por tamaño o textura.", "2º - Hace preguntas sobre los animales y las plantas.", "3º - Experimenta y registra cambios en elementos naturales."] }
    ],
    "Ética, Naturaleza y Sociedades": [
        { id: "E1", titulo: "Interacción, cuidado, conservación y regeneración de la naturaleza.", pdas: ["1º - Manifiesta agrado al convivir al aire libre.", "2º - Propone soluciones al manejo de basura escolar.", "3º - Asume compromisos permanentes de cuidado ecológico."] },
        { id: "E2", titulo: "Construcción de la identidad y pertenencia a una comunidad a partir de su historia y tradiciones.", pdas: ["1º - Narra costumbres de su núcleo familiar.", "2º - Participa con respeto en desfiles o festividades.", "3º - Conoce el origen de las leyendas e hitos locales."] }
    ],
    "De lo Humano y lo Comunitario": [
        { id: "H1", titulo: "Construcción de la identidad personal y cuidado de sí.", pdas: ["1º - Nombra sus cualidades físicas básicas.", "2º - Distingue lo que puede hacer solo o con ayuda.", "3º - Expresa orgullo por sus raíces comunitarias."] },
        { id: "H2", titulo: "Medidas de prevención de accidentes y situaciones de riesgo.", pdas: ["1º - Reconoce áreas de riesgo en casa y escuela.", "2º - Atiende reglas de seguridad ante emergencias.", "3º - Diseña y lee señalamientos de protección civil."] }
    ]
};

// 🔴 ¡Pega aquí tu clave real de Gemini! Así tus usuarios no la verán directamente en el cuadro de texto.
const LLAVE_INTERNA_OCULTA = "AIzaSyD_TU_API_KEY_REAL_AQUI"; 

function actualizarContenidos() {
    const campo = document.getElementById('campo').value;
    const conSel = document.getElementById('contenido');
    conSel.innerHTML = '<option value="">-- Selecciona un Contenido --</option>';
    document.getElementById('pda-list').innerHTML = '<span style="font-style: italic;">Selecciona un contenido...</span>';
    
    if(!campo) { conSel.disabled = true; return; }
    conSel.disabled = false;
    
    bancoDatos[campo].forEach(c => {
        let opt = document.createElement('option');
        opt.value = c.id;
        opt.textContent = c.titulo.substring(0, 80) + '...';
        conSel.appendChild(opt);
    });
}

function actualizarPDAs() {
    const campo = document.getElementById('campo').value;
    const id = document.getElementById('contenido').value;
    const container = document.getElementById('pda-list');
    container.innerHTML = '';
    
    if(!id) return;
    const objeto = bancoDatos[campo].find(c => c.id === id);
    
    objeto.pdas.forEach((p, i) => {
        container.innerHTML += `
            <div class="pda-item">
                <input type="checkbox" name="pda_chk" value="${p}" id="p_${i}">
                <label for="p_${i}">${p}</label>
            </div>`;
    });
}

async function generarConIA() {
    const passIngresada = document.getElementById('claveAcceso').value;
    
    // Aquí defines la contraseña fácil que usarán las maestras
    if(passIngresada !== "PREESCOLAR2026") { 
        alert('Contraseña del sistema incorrecta. Solicítala con la administradora.'); 
        return; 
    }
    
    const campo = document.getElementById('campo').value;
    const contenidoSel = document.getElementById('contenido').value;
    if(!campo || !contenidoSel) { alert('Por favor, selecciona un campo y un contenido primero.'); return; }
    
    const contenido = bancoDatos[campo].find(c => c.id === contenidoSel).titulo;
    let pdas = [];
    document.querySelectorAll('input[name="pda_chk"]:checked').forEach(c => pdas.push(c.value));
    const met = document.getElementById('metodologia').value;
    const proyecto = document.getElementById('proyecto').value || 'un tema de preescolar';

    document.getElementById('loading').style.display = 'block';

    const promptText = `Actúa como asesor experto en la NEM y educación preescolar. 
    Desarrolla el proyecto "${proyecto}" con la metodología "${met}". Campo: ${campo}. Contenido: ${contenido}. PDA: ${pdas.join(', ')}.
    Entrega el plan dividido exclusivamente por un guion largo "---": la primera parte con la secuencia didáctica lúdica (Inicio, Desarrollo, Cierre) y la segunda con estrategias de evaluación formativa y ajustes DUA.`;

    try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${LLAVE_INTERNA_OCULTA}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
        });
        
        const data = await response.json();
        const textResult = data.candidates[0].content.parts[0].text;
        const partes = textResult.split('---');

        document.getElementById('secuencia').value = partes[0] ? partes[0].trim() : textResult;
        document.getElementById('evaluacion').value = partes[1] ? partes[1].trim() : 'Revisar sugerencias del sistema.';
    } catch (error) {
        alert('Error al conectar con la IA. Verifica que la API Key interna sea válida.');
        console.error(error);
    } finally {
        document.getElementById('loading').style.display = 'none';
    }
}

function imprimirFormato() {
    const html = `
        <table class="header-table">
            <tr><td><strong>Docente:</strong> ${document.getElementById('docente').value}</td><td><strong>Proyecto:</strong> ${document.getElementById('proyecto').value}</td></tr>
            <tr><td><strong>Metodología:</strong> ${document.getElementById('metodologia').value}</td><td><strong>Modalidad:</strong> ${document.getElementById('modalidad').value}</td></tr>
        </table>
        <p><strong>📘 Campo Formativo:</strong> ${document.getElementById('campo').value}</p>
        <p><strong>👟 Actividades:</strong><br>${document.getElementById('secuencia').value.replace(/\n/g, '<br>')}</p>
        <p><strong>🔍 Evaluación / DUA:</strong><br>${document.getElementById('evaluacion').value.replace(/\n/g, '<br>')}</p>`;
    
    document.getElementById('print-area').innerHTML = html;
    document.getElementById('output').style.display = 'block';
}
</script>
</body>
</html>
